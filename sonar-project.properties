sonar.organization=hieplam
sonar.projectKey=hieplam_ai-dict
# Sources: production code only (the three packages' src dirs)
sonar.sources=packages/app/src,packages/extension-chrome/src,packages/extension-safari/src
# Test files (co-located in src AND in test/ dirs) are classified as tests
sonar.tests=packages/app/test,packages/extension-chrome/test,packages/extension-safari/test
sonar.test.inclusions=**/*.test.ts
# Keep src/*.test.ts out of the MAIN source set so Sonar never indexes a file
# as both source and test (that overlap is a hard "indexed twice" error)
sonar.exclusions=**/*.test.ts,**/dist/**,**/*.d.ts
# Copy-paste detection: the Paperlight theme token blocks (SEPIA_VARS / DARK_VARS /
# CONTRAST_VARS) are intentionally parallel DATA tables — identical --ad-* property keys
# with per-theme values — so CPD flags them as duplication. That is a false positive on a
# design-token source of truth; exclude it from duplication detection only.
sonar.cpd.exclusions=**/ui/styles/tokens.ts
# Coverage exclusions — MV3 composition roots / entry points are thin DI wiring that loads
# chrome.* at module scope; the project deliberately leaves them out of unit-coverage
# (mirrors the `coverage.exclude` in packages/extension-chrome/vitest.config.ts) and exercises
# them through the Playwright e2e suite instead. Without this, Sonar's new-code coverage gate
# counts these untested-by-design lines as uncovered. The real logic lives in measured modules
# (adapters/**, router.ts, inbound.ts, side-panel-messages.ts).
sonar.coverage.exclusions=packages/extension-chrome/src/content.ts,packages/extension-chrome/src/content-elements.ts,packages/extension-chrome/src/options.ts,packages/extension-chrome/src/side-panel.ts,packages/extension-chrome/src/sw.ts
# Coverage — three lcov files, comma-separated
sonar.javascript.lcov.reportPaths=packages/app/coverage/lcov.info,packages/extension-chrome/coverage/lcov.info,packages/extension-safari/coverage/lcov.info
