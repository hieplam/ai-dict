<svg xmlns="http://www.w3.org/2000/svg" width="1320" height="900" viewBox="0 0 1320 900" font-family="ui-sans-serif, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <marker id="arrow-di" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7c3aed"/>
    </marker>
  </defs>

  <rect width="1320" height="900" fill="#ffffff"/>
  <text x="660" y="40" text-anchor="middle" font-size="20" font-weight="700" fill="#0f172a">ai-dict — component relations &amp; dependency direction (one core, two shells, deps point inward)</text>

  <!-- system boundary -->
  <rect x="20" y="60" width="1280" height="770" rx="10" fill="none" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="36" y="84" font-size="13" fill="#64748b" font-weight="600">system c3-0 · ai-dict</text>

  <!-- ===================== chrome shell ===================== -->
  <rect x="55" y="120" width="380" height="252" rx="8" fill="#faf5ff" stroke="#7c3aed" stroke-width="2"/>
  <text x="75" y="143" font-size="14" font-weight="700" fill="#6d28d9">c3-2 · extension-chrome (MV3 shell)</text>

  <rect x="75" y="156" width="340" height="44" rx="5" fill="#ede9fe" stroke="#8b5cf6"/>
  <text x="85" y="174" font-size="12.5" font-weight="600" fill="#1e1b4b">c3-210 chrome-service-worker — sw.ts ★</text>
  <text x="85" y="192" font-size="11.5" fill="#475569">composition root: constructs adapters, gates messages</text>

  <rect x="75" y="208" width="340" height="44" rx="5" fill="#ede9fe" stroke="#8b5cf6"/>
  <text x="85" y="226" font-size="12.5" font-weight="600" fill="#1e1b4b">c3-211 chrome-content-script — content.ts ★</text>
  <text x="85" y="244" font-size="11.5" fill="#475569">composition root: wires lookup workflow in-page</text>

  <rect x="75" y="260" width="340" height="38" rx="5" fill="#ede9fe" stroke="#8b5cf6"/>
  <text x="85" y="284" font-size="12.5" fill="#1e1b4b"><tspan font-weight="600">c3-201 chrome-adapters</tspan> — chrome.* port impls</text>

  <rect x="75" y="306" width="340" height="38" rx="5" fill="#ede9fe" stroke="#8b5cf6"/>
  <text x="85" y="330" font-size="12.5" fill="#1e1b4b"><tspan font-weight="600">c3-212 chrome-ui-pages</tspan> — options, side panel</text>

  <!-- ===================== safari shell ===================== -->
  <rect x="55" y="478" width="380" height="252" rx="8" fill="#faf5ff" stroke="#7c3aed" stroke-width="2"/>
  <text x="75" y="501" font-size="14" font-weight="700" fill="#6d28d9">c3-3 · extension-safari (MV3 shell)</text>

  <rect x="75" y="514" width="340" height="44" rx="5" fill="#ede9fe" stroke="#8b5cf6"/>
  <text x="85" y="532" font-size="12.5" font-weight="600" fill="#1e1b4b">c3-310 safari-service-worker — sw.ts ★</text>
  <text x="85" y="550" font-size="11.5" fill="#475569">composition root: same role as Chrome's sw.ts</text>

  <rect x="75" y="566" width="340" height="44" rx="5" fill="#ede9fe" stroke="#8b5cf6"/>
  <text x="85" y="584" font-size="12.5" font-weight="600" fill="#1e1b4b">c3-311 safari-content-script — content.ts ★</text>
  <text x="85" y="602" font-size="11.5" fill="#475569">composition root: wires the identical core</text>

  <rect x="75" y="618" width="340" height="38" rx="5" fill="#ede9fe" stroke="#8b5cf6"/>
  <text x="85" y="642" font-size="12.5" fill="#1e1b4b"><tspan font-weight="600">c3-301 safari-adapters</tspan> — Safari-native port impls</text>

  <rect x="75" y="664" width="340" height="38" rx="5" fill="#ede9fe" stroke="#8b5cf6"/>
  <text x="85" y="688" font-size="12.5" fill="#1e1b4b"><tspan font-weight="600">c3-312 safari-options-page</tspan> — API key entry</text>

  <!-- ===================== app core ===================== -->
  <rect x="560" y="110" width="700" height="700" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="2.5"/>
  <text x="580" y="136" font-size="15" font-weight="700" fill="#1d4ed8">c3-1 · app (@ai-dict/app) — the portable core, bundled verbatim into both shells</text>
  <text x="580" y="158" font-size="12" fill="#475569" font-style="italic">outer layer: shared adapters · UI · wire protocol (packages/app/src/app, src/ui, wire.ts)</text>

  <!-- outer layer row 1 -->
  <rect x="585" y="172" width="210" height="46" rx="5" fill="#dbeafe" stroke="#3b82f6"/>
  <text x="595" y="190" font-size="12.5" font-weight="600" fill="#1e3a5f">c3-111 lookup-router</text>
  <text x="595" y="208" font-size="11.5" fill="#475569">dispatches wire messages</text>

  <rect x="810" y="172" width="210" height="46" rx="5" fill="#dbeafe" stroke="#3b82f6"/>
  <text x="820" y="190" font-size="12.5" font-weight="600" fill="#1e3a5f">c3-114 lookup-clients</text>
  <text x="820" y="208" font-size="11.5" fill="#475569">Gemini / OpenAI, selector</text>

  <rect x="1035" y="172" width="210" height="46" rx="5" fill="#dbeafe" stroke="#3b82f6"/>
  <text x="1045" y="190" font-size="12.5" font-weight="600" fill="#1e3a5f">c3-115 content-adapters</text>
  <text x="1045" y="208" font-size="11.5" fill="#475569">DOM selection, bottom sheet</text>

  <!-- outer layer row 2 -->
  <rect x="585" y="228" width="210" height="46" rx="5" fill="#dbeafe" stroke="#3b82f6"/>
  <text x="595" y="246" font-size="12.5" font-weight="600" fill="#1e3a5f">c3-116 markdown-sanitize</text>
  <text x="595" y="264" font-size="11.5" fill="#475569">only trusted-HTML producer</text>

  <rect x="810" y="228" width="210" height="46" rx="5" fill="#dbeafe" stroke="#3b82f6"/>
  <text x="820" y="246" font-size="12.5" font-weight="600" fill="#1e3a5f">c3-117 ui-components</text>
  <text x="820" y="264" font-size="11.5" fill="#475569">web components, shadow DOM</text>

  <rect x="1035" y="228" width="210" height="46" rx="5" fill="#dbeafe" stroke="#3b82f6"/>
  <text x="1045" y="246" font-size="12.5" font-weight="600" fill="#1e3a5f">c3-103 wire-protocol</text>
  <text x="1045" y="264" font-size="11.5" fill="#475569">validated message schemas</text>

  <!-- arrows: outer layer -> ports ring -->
  <line x1="690" y1="282" x2="690" y2="356" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="915" y1="282" x2="915" y2="356" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="1140" y1="282" x2="1140" y2="356" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="932" y="320" font-size="12" fill="#334155" font-style="italic">implement &amp; call the port interfaces</text>

  <!-- ports ring -->
  <rect x="600" y="360" width="620" height="420" rx="8" fill="#fffbeb" stroke="#d97706" stroke-width="2.5"/>
  <text x="620" y="386" font-size="13.5" font-weight="700" fill="#b45309">c3-102 · ports (ports.ts) — the only doorway into the domain</text>
  <text x="620" y="406" font-size="11.5" fill="#92400e">SelectionSource · TriggerUI · ResultRenderer · LookupClient · SettingsStore · KV</text>

  <!-- domain core -->
  <rect x="650" y="430" width="520" height="300" rx="8" fill="#ecfdf5" stroke="#059669" stroke-width="2.5"/>
  <text x="910" y="456" text-anchor="middle" font-size="13.5" font-weight="700" fill="#047857">domain core — packages/app/src/domain/** · depends on NOTHING outward</text>

  <rect x="675" y="478" width="230" height="52" rx="5" fill="#d1fae5" stroke="#10b981"/>
  <text x="685" y="498" font-size="12.5" font-weight="600" fill="#064e3b">c3-110 lookup-workflow</text>
  <text x="685" y="516" font-size="11.5" fill="#475569">orchestrates the lookup flow</text>

  <rect x="920" y="478" width="230" height="52" rx="5" fill="#d1fae5" stroke="#10b981"/>
  <text x="930" y="498" font-size="12.5" font-weight="600" fill="#064e3b">c3-101 domain-types</text>
  <text x="930" y="516" font-size="11.5" fill="#475569">shared vocabulary, error mapper</text>

  <rect x="675" y="542" width="230" height="52" rx="5" fill="#d1fae5" stroke="#10b981"/>
  <text x="685" y="562" font-size="12.5" font-weight="600" fill="#064e3b">c3-112 persistence-policies</text>
  <text x="685" y="580" font-size="11.5" fill="#475569">cache + history over KV port</text>

  <rect x="920" y="542" width="230" height="52" rx="5" fill="#d1fae5" stroke="#10b981"/>
  <text x="930" y="562" font-size="12.5" font-weight="600" fill="#064e3b">c3-113 prompt-builder</text>
  <text x="930" y="580" font-size="11.5" fill="#475569">template placeholder filling</text>

  <!-- domain -> ports arrow -->
  <text x="910" y="650" text-anchor="middle" font-size="12" fill="#334155" font-style="italic">domain imports ONLY its own types + ../ports (interfaces)</text>
  <line x1="700" y1="430" x2="700" y2="412" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="1120" y1="430" x2="1120" y2="412" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>

  <text x="910" y="700" text-anchor="middle" font-size="13" font-weight="700" fill="#dc2626">✗  no chrome.*   ✗  no DOM   ✗  no fetch   ✗  no adapter imports   ✗  no API key</text>

  <!-- pure-core testability note -->
  <text x="910" y="762" text-anchor="middle" font-size="12" fill="#92400e" font-style="italic">pure core ⇒ runs in plain-Node vitest with fake ports — no browser needed</text>

  <!-- ===================== shell -> core arrows ===================== -->
  <line x1="435" y1="246" x2="556" y2="246" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="496" y="236" text-anchor="middle" font-size="12" font-weight="600" fill="#334155">imports the core</text>

  <line x1="435" y1="604" x2="556" y2="604" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="496" y="594" text-anchor="middle" font-size="12" font-weight="600" fill="#334155">imports the core</text>

  <!-- DI dashed arrows: composition roots inject adapters through ports -->
  <path d="M 435 188 C 520 188, 560 320, 597 408" fill="none" stroke="#7c3aed" stroke-width="2" stroke-dasharray="7 5" marker-end="url(#arrow-di)"/>
  <path d="M 435 546 C 520 546, 555 510, 597 478" fill="none" stroke="#7c3aed" stroke-width="2" stroke-dasharray="7 5" marker-end="url(#arrow-di)"/>
  <text x="476" y="436" font-size="12" fill="#7c3aed" font-style="italic">★ inject concrete</text>
  <text x="476" y="452" font-size="12" fill="#7c3aed" font-style="italic">adapters through</text>
  <text x="476" y="468" font-size="12" fill="#7c3aed" font-style="italic">the ports (DI)</text>

  <!-- inward direction annotation -->
  <text x="1283" y="445" text-anchor="middle" font-size="13" font-weight="700" fill="#0f172a" transform="rotate(90 1283 445)">dependency direction: shells → adapters → ports → domain (inward only, never back out)</text>

  <!-- ===================== legend ===================== -->
  <line x1="60" y1="858" x2="120" y2="858" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="130" y="862" font-size="12.5" fill="#0f172a">compile-time import — always points inward toward the domain</text>

  <line x1="560" y1="858" x2="620" y2="858" stroke="#7c3aed" stroke-width="2" stroke-dasharray="7 5" marker-end="url(#arrow-di)"/>
  <text x="630" y="862" font-size="12.5" fill="#0f172a">runtime injection at a composition root (★ sw.ts / content.ts — the only places that `new` adapters)</text>
</svg>
