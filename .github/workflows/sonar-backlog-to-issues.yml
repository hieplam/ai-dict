name: sonar-backlog-to-issues
# One-time (manually triggered) backlog seeding: imports SonarQube Cloud
# findings (Bugs + Vulnerabilities ≥ Major, TO_REVIEW hotspots) as GitHub
# Issues. Idempotent — re-runs skip findings that already have an issue.

on:
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  import:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version-file: .bun-version
      - run: bun scripts/sonar-issues.mjs
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
          SONAR_PROJECT_KEY: hieplam_ai-dict
          GITHUB_SHA: ${{ github.sha }}
