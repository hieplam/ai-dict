name: release-please

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  release-please:
    runs-on: ubuntu-latest
    env:
      CWS_EXTENSION_ID: ${{ secrets.CWS_EXTENSION_ID }}
    permissions:
      contents: write # push the version-bump commit and the vX.Y.Z tag
      pull-requests: write # open and update the Release PR
    steps:
      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@5c625bfb5d1ff62eadeeb3772007f7f66fdcf071 # v4.4.1
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      # When a release is cut, attach the prebuilt Chrome extension zip so end
      # users have a real artifact to download. Runs in THIS workflow (not the
      # tag-triggered release.yml) because release-please's GITHUB_TOKEN tags do
      # not trigger tag-push workflows.
      - name: Checkout
        if: ${{ steps.release.outputs.release_created }}
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up bun
        if: ${{ steps.release.outputs.release_created }}
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version-file: .bun-version

      - name: Cache bun install
        if: ${{ steps.release.outputs.release_created }}
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - name: Install deps
        if: ${{ steps.release.outputs.release_created }}
        run: bun install --frozen-lockfile

      - name: Guard — no API key baked into the release build (rule-api-key-isolation / S1)
        if: ${{ steps.release.outputs.release_created }}
        run: test -z "${GEMINI_API_KEY:-}"

      - name: Build Chrome extension
        if: ${{ steps.release.outputs.release_created }}
        # GA4 telemetry creds are baked into the SW bundle at build time (sw.ts only — never
        # content scripts). Empty when the secrets are unset → the error-reporting sink no-ops,
        # so this is safe before GA4 is configured. Unlike GEMINI_API_KEY (the user's key, guarded
        # empty above), the GA4 api_secret is OUR write-only Measurement Protocol credential and is
        # meant to ship in the release build.
        env:
          GA4_MEASUREMENT_ID: ${{ secrets.GA4_MEASUREMENT_ID }}
          GA4_API_SECRET: ${{ secrets.GA4_API_SECRET }}
        run: bun run --filter @ai-dict/extension-chrome build

      - name: Zip unpacked dist -> dist-chrome.zip
        if: ${{ steps.release.outputs.release_created }}
        run: cd packages/extension-chrome/dist && zip -r "$GITHUB_WORKSPACE/dist-chrome.zip" .

      - name: Upload dist-chrome.zip to the release
        if: ${{ steps.release.outputs.release_created }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ steps.release.outputs.tag_name }}" dist-chrome.zip --clobber

      - name: Publish to Chrome Web Store
        # Skips (does not fail) until the four CWS_* secrets are configured, so releases still
        # attach dist-chrome.zip before store setup is done. v4 CLI: omitting the `upload`
        # subcommand uploads AND publishes; auth comes from CLIENT_ID/CLIENT_SECRET/REFRESH_TOKEN.
        if: ${{ steps.release.outputs.release_created && env.CWS_EXTENSION_ID != '' }}
        env:
          CLIENT_ID: ${{ secrets.CWS_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CWS_CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.CWS_REFRESH_TOKEN }}
        run: ./node_modules/.bin/chrome-webstore-upload --source dist-chrome.zip --extension-id "$CWS_EXTENSION_ID"
